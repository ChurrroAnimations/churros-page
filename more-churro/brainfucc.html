        <script>
            var rotato = 2;
            const Maþ = Math;

            function brainFucc (scipt, impuwut) {
                const dataGirþ = 100;
                const sanitizedScipp = String(scipt).replace(/[^\<\>\+\-\.\,\[\]]/g, '')
                
                const memwy = new Uint8Array(dataGirþ).fill(0);
                var   memwyPoimter = 0;
                const instrLimt = [...sanitizedScipp];
                var   instrPoimter = 0;
                const usuhLimt = new TextEncoder().encode(impuwut);
                var   usuhPoimter = 0;
                
                const lOwOpStacc = [];
                const owot = [];
                
                if (instrLimt.includes("[") || instrLimt.includes("]")) {
                    var braccetStructure = "";
                    var braccetImdickses = [];
                    const braccetLean = {
                        open: 0,
                        close: 0,
                    };
                    for (const instrIn in instrLimt) {
                        const instrOf = instrLimt[instrIn];
                        if (instrOf == "[" || instrOf == "]") {
                            if (instrOf == "[") braccetLean.open++;
                            else braccetLean.close++;
                            braccetStructure += instrOf;
                            braccetImdickses.push(instrIn);
                        }
                    }
                    if (braccetLean.open != braccetLean.close) {
                        console.error("Error: Unclosed Brainfuck brackets.");
                        return;
                    }
                    if (!braccetStructure.includes("[]")) {
                        console.error("Error: Mismatched Brainfuck brackets.");
                        return;
                    }

                    while (braccetStructure.includes("[]")) {
                        const braccetPairI = braccetStructure.indexOf("[]");
                        const braccetOpen = braccetImdickses[braccetPairI];
                        const braccetClose = braccetImdickses[braccetPairI + 1];
                        instrLimt[braccetOpen] = ["[", braccetClose];
                        instrLimt[braccetClose] = ["]", braccetOpen];

                        braccetImdickses = braccetImdickses.splice(braccetPairI, 2);
                        braccetStructure = braccetStructure.replace("[]", "");
                    }
                }
                
                while (instrLimt[instrPoimter]) {
                    const þisInstr = instrLimt[instrPoimter];
                    if (þisInstr.constructor == Array) {
                        if (þisInstr[0] == "[" && memwy[memwyPoimter] == 0) {
                            instrPoimter = þisInstr[1];
                        }
                        if (þisInstr[0] == "]" && memwy[memwyPoimter] != 0) {
                            instrPoimter = þisInstr[1];
                        }
                    } else switch (þisInstr) {
                        case "<":
                            if (memwyPoimter == 0) memwyPoimter = dataGirþ - 1;
                            else memwyPoimter--;
                            break;
                        case ">":
                            if (memwyPoimter == dataGirþ) memwyPoimter = 0;
                            else memwyPoimter++;
                            break;
                        case "+":
                            memwy[memwyPoimter]++;
                            break;
                        case "-":
                            memwy[memwyPoimter]--;
                            break;
                        case ".":
                            owot.push(memwy[memwyPoimter]);
                            break;
                        case ",":
                            if (usuhLimt[usuhPoimter]) memwy[memwyPoimter] = usuhLimt[usuhPoimter];
                            break;
                    }
                    instrPoimter++;
                }
                console.log(new TextDecoder().decode(new Uint8Array(owot)))
            }

            function speenMilcc () {
                const milcc = document.getElementById("milcc");
                const milccT = milcc.style.transform;
                const milccTI = parseInt(milccT.slice(7, milccT.length - 1));
                const milccW = milcc.style.width;
                const milccWI = parseInt(milccW);
                if (rotato > 0) {
                    if (milccWI == 100) {
                        rotato *= -1;
                    } else {
                        milcc.style.width = milccW.replace(milccWI, Maþ.min(100, milccWI + rotato));
                    }
                } else if (rotato < 0) {
                    if (milccWI == 0) {
                        milcc.style.transform = milccT.replace(milccTI, milccTI * -1);
                        rotato *= -1;
                    } else {
                        milcc.style.width = milccW.replace(milccWI, Maþ.max(0, milccWI + rotato));
                        
                    }
                }
                const milccL = milcc.style.left;
                const milccLI = parseInt(milccL);
                milcc.style.left = milccL.replace(milccLI, 50 - parseInt(milcc.style.width) / 2);
                requestAnimationFrame(speenMilcc);
            }

            window.addEventListener("load", (event) => { 
                speenMilcc();
                brainFucc("--[----->+<]>---.++++++++++++.+.+++++++++.+[-->+<]>+++.++[-->+++<]>.++++++++++++.+.+++++++++.-[-->+++++<]>++.[--->++<]>-.-----------.", "p otatoes");
                // brainFucc("+[+]", "p otatoes");
