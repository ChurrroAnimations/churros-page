    <body>
        <h1 style="margin: auto; text-align: center;">
            <br>
            <br>
            Are you having a seizure yet?
        </h1>
        <script>
            var color = false;
            async function hehe () {
                color = !color;
                document.documentElement.style.backgroundColor = color ? "black" : "white";
                document.documentElement.style.color = color ? "white" : "black";
                await new Promise(r => setTimeout(r, 50));
                requestAnimationFrame(hehe);
            }
            window.onload = hehe;
        </script>
    </body>
